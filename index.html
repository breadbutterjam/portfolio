<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .download-btn {
      display: inline-block;
      margin-bottom: 24px;
      padding: 12px 28px;
      background: #1a1a1a;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 15px;
      letter-spacing: 0.3px;
      transition: background 0.2s;
    }

    .download-btn:hover {
      background: #333;
    }

    .pdf-container {
      width: 100%;
      max-width: 900px;
      height: 85vh;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .fallback {
      display: none;
      text-align: center;
      padding: 40px 20px;
      color: #555;
      font-size: 15px;
    }

    .fallback a {
      color: #1a1a1a;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <a class="download-btn" href="portfolio.pdf" download>Download PDF</a>

  <div class="pdf-container">
    <iframe
      src="Portfolio.pdf"
      title="Portfolio"
      onerror="document.querySelector('.fallback').style.display='block'"
    ></iframe>
    <div class="fallback">
      Unable to display the PDF. <a href="Portfolio.pdf">Click here to open it directly.</a>
    </div>
  </div>

</body>
</html>
